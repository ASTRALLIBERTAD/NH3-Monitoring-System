name: Firmware Build (ESP32-C6)

on:
  push:
  pull_request:

permissions:
  contents: write   # needed to create/update releases

jobs:
  build-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure arduino-cli
        run: |
          arduino-cli config init
          # ESP32 Arduino core (Espressif) — supports ESP32-C6 from 3.x onward
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Update index & install ESP32 core
        run: |
          arduino-cli core update-index
          # 3.x is required for ESP32-C6 (RISC-V) support
          arduino-cli core install esp32:esp32@3.0.7

      - name: Install required libraries
        run: |
          arduino-cli lib install "U8g2"
          arduino-cli lib install "DHT sensor library"
          arduino-cli lib install "Adafruit Unified Sensor"

      - name: Compile sketch for ESP32-C6
        run: |
          mkdir -p firmware/build
          arduino-cli compile \
            --fqbn esp32:esp32:esp32c6 \
            --warnings default \
            --output-dir firmware/build \
            firmware/esp32/main_ble/main_ble.ino

      - name: Upload compiled binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ammonia-monitor-firmware
          path: firmware/build/

      # Only publish a release on push (not on PRs)
      - name: Publish to GitHub Releases
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firmware-latest
          name: "Firmware (ESP32-C6) — Latest"
          body: |
            Auto-built firmware for the AmmoniaMonitor ESP32-C6.
            Flash `main_ble.ino.bin` using esptool or the Arduino IDE.
          prerelease: false
          files: |
            firmware/build/main_ble.ino.bin
            firmware/build/main_ble.ino.elf