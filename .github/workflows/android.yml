name: Android Build

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish APK to GitHub Releases?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write   # needed to create/update releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x app/gradlew

      - name: Build debug APK
        run: |
          cd app
          ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ammonia-monitor-debug
          path: app/app/build/outputs/apk/debug/*.apk

      # Only published when you choose 'true' in the workflow_dispatch input
      - name: Publish to GitHub Releases
        if: inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-latest
          name: "Android App — Latest"
          body: |
            Debug APK for the AmmoniaMonitor Android app.
            Enable "Install from unknown sources" before installing.
          prerelease: false
          files: app/app/build/outputs/apk/debug/*.apk